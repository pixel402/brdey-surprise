<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secret Password❤️</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">
<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:linear-gradient(to bottom,#020111,#0b1d3a,#000);
    overflow:hidden;
}
.card{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(12px);
    padding:50px;
    border-radius:25px;
    text-align:center;
    width:400px;
    box-shadow:0 0 30px rgba(255,255,255,.15);
}
h1{ font-family:'Great Vibes',cursive; font-size:55px; color:#ffd6e8; }
p{ margin-top:15px; color:#ddd; font-size:18px; }
input{
    margin-top:30px;
    width:90%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:30px;
    text-align:center;
    font-size:18px;
}
button{
    margin-top:25px;
    padding:15px 35px;
    border:none;
    border-radius:30px;
    background:#ff4f81;
    color:white;
    cursor:pointer;
    font-size:18px;
}
button:hover{ background:#ff2c6b; }
#error{ margin-top:15px; color:#ff9d9d; font-size:16px; }
</style>
</head>
<body>
<div class="card">
<h1>❤️Dramatically,this is the door to my heartttt❤️</h1>
<p>OK the password is our own little secret and in all small letters😉</p>
<input type="password" id="pass" placeholder="Enter Password">
<br>
<button onclick="checkPassword()">Unlock ❤️</button>
<p id="error"></p>
</div>
<script>
function checkPassword(){
    var password=document.getElementById("pass").value;
    /* CHANGE THIS PASSWORD */
    if(password=="tuttu"){
        window.location.href="letter.html";
    } else {
        document.getElementById("error").innerHTML="u don't love me anymore??Try again🥺";
    }
}
</script>
</body>
</html>
