 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAPPY 20❤️</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
body{
margin:0;
min-height:100vh;
background:linear-gradient(to bottom,#050816,#0d1b2a);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
font-family:'Poppins',sans-serif;
color:white;
}
.container{ text-align:center; z-index:2; padding:20px; }
h1{ font-family:'Great Vibes',cursive; font-size:65px; color:#ffd6e7; text-shadow:0 0 20px rgba(255,255,255,.7); }
p{ margin-top:20px; font-size:20px; line-height:1.8; color:#ddd; max-width:500px; }
.heart{
position:absolute;
top:-10%;
font-size:24px;
color:#ff4f81;
animation:fall linear infinite;
z-index:1;
pointer-events:none;
}
@keyframes fall{
to{ transform:translateY(110vh) rotate(360deg); opacity:0.2; }
}
</style>
</head>
<body>

<div class="container">
  <h1>My Love❤️</h1>
  <p>
    Thank you for being you.<br>
    I hope this little surprise made you smile today.<br><br>
    Here's to another year of us, and many, many more ❤️
    btw be glad that u got to spend ur 20's with your goputty💕
  </p>
</div>

<script>
function createHearts(){
  const heart = document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.animationDuration = (Math.random() * 3 + 3) + "s";
  heart.style.fontSize = (Math.random() * 15 + 15) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}
setInterval(createHearts, 300);
</script>

</body>
</html>
